name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  GIT_VERSION: ${{ github.ref_name }}
  IMAGE_REGISTRY: ${{ vars.ACR_REGISTRY }}
  IMAGE_REPOSITORY: ${{ vars.ACR_NAMESPACE }}
  HELM_OCI_REGISTRY: ${{ vars.HELM_OCI_REGISTRY }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Set up QEMU
        if: github.event_name == 'push'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Release Docker Image
        if: github.event_name == 'push'
        run: make release-image

      - name: Login to Helm Registry
        if: github.ref_type == 'tag'
        env:
          REGISTRY_USERNAME: ${{ secrets.HELM_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.HELM_REGISTRY_PASSWORD }}
        run: printf '%s' "$REGISTRY_PASSWORD" | helm registry login "$HELM_OCI_REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Release Helm Chart
        if: github.ref_type == 'tag'
        run: make release-helm
