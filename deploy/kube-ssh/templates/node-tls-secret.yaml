{{- if and (include "kube-ssh.nodeEnabled" .) (not .Values.kubeSsh.node.tls.existingSecret) }}
{{- $secretName := include "kube-ssh.nodeTLSSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $data := dict }}
{{- if and $existing (hasKey ($existing.data | default dict) "ca.crt") (hasKey ($existing.data | default dict) "tls.crt") (hasKey ($existing.data | default dict) "tls.key") }}
{{- $data = $existing.data }}
{{- else }}
{{- $serverName := include "kube-ssh.nodeServerName" . }}
{{- $ca := genCA (printf "%s node CA" (include "kube-ssh.fullname" .)) 3650 }}
{{- $certificate := genSignedCert .Values.kubeSsh.node.expectedClientName nil (list $serverName (printf "%s-node" (include "kube-ssh.fullname" .))) 3650 $ca }}
{{- $_ := set $data "ca.crt" ($ca.Cert | b64enc) }}
{{- $_ := set $data "tls.crt" ($certificate.Cert | b64enc) }}
{{- $_ := set $data "tls.key" ($certificate.Key | b64enc) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kube-ssh.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
type: kubernetes.io/tls
data:
  {{- range $key, $value := $data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
