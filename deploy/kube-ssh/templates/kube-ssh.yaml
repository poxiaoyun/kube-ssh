apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-ssh.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kube-ssh.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- $deploymentAnnotations := merge (.Values.kubeSsh.deploymentAnnotations | default dict) (.Values.kubeSsh.commonAnnotations | default dict) }}
  {{- if $deploymentAnnotations }}
  annotations:
    {{- toYaml $deploymentAnnotations | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.kubeSsh.replicaCount }}
  revisionHistoryLimit: {{ .Values.kubeSsh.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "kube-ssh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-ssh.selectorLabels" . | nindent 8 }}
        {{- with .Values.kubeSsh.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.kubeSsh.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kube-ssh.serviceAccountName" . }}
      {{- $imagePullSecrets := include "kube-ssh.imagePullSecrets" . }}
      {{- if $imagePullSecrets }}
      {{- $imagePullSecrets | nindent 6 }}
      {{- end }}
      {{- with .Values.kubeSsh.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubeSsh.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.kubeSsh.schedulerName }}
      schedulerName: {{ . | quote }}
      {{- end }}
      {{- with .Values.kubeSsh.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubeSsh.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubeSsh.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubeSsh.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubeSsh.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kube-ssh
          image: {{ include "kube-ssh.image" . | quote }}
          imagePullPolicy: {{ .Values.kubeSsh.image.pullPolicy | quote }}
          {{- with .Values.kubeSsh.extraArgs }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: ssh
              containerPort: {{ .Values.kubeSsh.containerPorts.ssh }}
              protocol: TCP
            {{- if .Values.kubeSsh.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.kubeSsh.containerPorts.metrics }}
              protocol: TCP
            {{- end }}
          {{- with .Values.kubeSsh.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.kubeSsh.livenessProbe.enabled }}
          livenessProbe:
            {{- if .Values.kubeSsh.metrics.enabled }}
            httpGet:
              path: /healthz
              port: metrics
            {{- else }}
            tcpSocket:
              port: ssh
            {{- end }}
            initialDelaySeconds: {{ .Values.kubeSsh.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.kubeSsh.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.kubeSsh.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.kubeSsh.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.kubeSsh.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.kubeSsh.readinessProbe.enabled }}
          readinessProbe:
            {{- if .Values.kubeSsh.metrics.enabled }}
            httpGet:
              path: /readyz
              port: metrics
            {{- else }}
            tcpSocket:
              port: ssh
            {{- end }}
            initialDelaySeconds: {{ .Values.kubeSsh.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.kubeSsh.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.kubeSsh.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.kubeSsh.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.kubeSsh.readinessProbe.successThreshold }}
          {{- end }}
          {{- with .Values.kubeSsh.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.kubeSsh.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: LISTEN_ADDRESS
              value: {{ printf ":%v" .Values.kubeSsh.containerPorts.ssh | quote }}
            {{- if .Values.kubeSsh.metrics.enabled }}
            - name: METRICS_LISTEN_ADDRESS
              value: {{ printf ":%v" .Values.kubeSsh.containerPorts.metrics | quote }}
            {{- with .Values.kubeSsh.metrics.path }}
            - name: METRICS_PATH
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.containerMode }}
            - name: POLICY_DEFAULT_CONTAINER_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.capabilities }}
            - name: POLICY_DEFAULT_CAPABILITY
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.envAllowlist }}
            - name: POLICY_DEFAULT_ENV
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.localForwardDestinations }}
            - name: POLICY_DEFAULT_LOCAL_FORWARD
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.remoteForwardBinds }}
            - name: POLICY_DEFAULT_REMOTE_FORWARD
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.defaultShell }}
            - name: POLICY_DEFAULT_SHELL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.idleTimeout }}
            - name: POLICY_DEFAULT_IDLE_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.defaults.maxDuration }}
            - name: POLICY_DEFAULT_MAX_DURATION
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.containerMode }}
            - name: POLICY_LIMIT_CONTAINER_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.capabilities }}
            - name: POLICY_LIMIT_CAPABILITY
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.envAllowlist }}
            - name: POLICY_LIMIT_ENV
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.localForwardDestinations }}
            - name: POLICY_LIMIT_LOCAL_FORWARD
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.remoteForwardBinds }}
            - name: POLICY_LIMIT_REMOTE_FORWARD
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.shells }}
            - name: POLICY_LIMIT_SHELL
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.idleTimeout }}
            - name: POLICY_LIMIT_IDLE_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.policy.limits.maxDuration }}
            - name: POLICY_LIMIT_MAX_DURATION
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.helper.path }}
            - name: HELPER_PATH
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.helper.remoteDir }}
            - name: HELPER_REMOTE_DIR
              value: {{ . | quote }}
            {{- end }}
            - name: ACCESS_POLICY_ENABLED
              value: {{ .Values.kubeSsh.accessPolicy.enabled | quote }}
            {{- with .Values.kubeSsh.accessPolicy.namespace }}
            - name: ACCESS_POLICY_NAMESPACE
              value: {{ . | quote }}
            {{- end }}
            - name: AUTHENTICATION_ANONYMOUS
              value: {{ .Values.kubeSsh.authentication.anonymous | quote }}
            {{- with .Values.kubeSsh.authentication.authorizedKeys }}
            - name: AUTHORIZED_KEY
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.authentication.passwords }}
            - name: AUTHENTICATION_PASSWORD
              value: {{ join " " . | quote }}
            {{- end }}
            {{- $authenticationWebhookEnv := include "kube-ssh.webhookEnv" (dict "prefix" "authentication" "webhook" .Values.kubeSsh.authentication.webhook) }}
            {{- if $authenticationWebhookEnv }}
            {{- $authenticationWebhookEnv | nindent 12 }}
            {{- end }}
            - name: AUTHORIZATION_ALLOW_ALL
              value: {{ .Values.kubeSsh.authorization.allowAll | quote }}
            - name: AUTHORIZATION_KUBERNETES_SAR
              value: {{ .Values.kubeSsh.authorization.kubernetesSAR | quote }}
            {{- $authorizationWebhookEnv := include "kube-ssh.webhookEnv" (dict "prefix" "authorization" "webhook" .Values.kubeSsh.authorization.webhook) }}
            {{- if $authorizationWebhookEnv }}
            {{- $authorizationWebhookEnv | nindent 12 }}
            {{- end }}
            {{- if or .Values.kubeSsh.hostKey.existingSecret .Values.kubeSsh.hostKey.privateKey }}
            - name: HOST_KEY_FILE
              value: {{ printf "%s/%s" .Values.kubeSsh.hostKey.mountPath .Values.kubeSsh.hostKey.secretKey | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.kubeSsh.extraEnvVarsCM .Values.kubeSsh.extraEnvVarsSecret }}
          envFrom:
            {{- with .Values.kubeSsh.extraEnvVarsCM }}
            - configMapRef:
                name: {{ . | quote }}
            {{- end }}
            {{- with .Values.kubeSsh.extraEnvVarsSecret }}
            - secretRef:
                name: {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- if or .Values.kubeSsh.hostKey.existingSecret .Values.kubeSsh.hostKey.privateKey .Values.kubeSsh.extraVolumeMounts }}
          volumeMounts:
            {{- if or .Values.kubeSsh.hostKey.existingSecret .Values.kubeSsh.hostKey.privateKey }}
            - name: host-key
              mountPath: {{ .Values.kubeSsh.hostKey.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- with .Values.kubeSsh.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- with .Values.kubeSsh.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.kubeSsh.hostKey.existingSecret .Values.kubeSsh.hostKey.privateKey .Values.kubeSsh.extraVolumes }}
      volumes:
        {{- if or .Values.kubeSsh.hostKey.existingSecret .Values.kubeSsh.hostKey.privateKey }}
        - name: host-key
          secret:
            secretName: {{ include "kube-ssh.hostKeySecretName" . }}
            defaultMode: 0600
        {{- end }}
        {{- with .Values.kubeSsh.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-ssh.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kube-ssh.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- $serviceAnnotations := merge (.Values.kubeSsh.service.annotations | default dict) (.Values.kubeSsh.commonAnnotations | default dict) }}
  {{- if $serviceAnnotations }}
  annotations:
    {{- toYaml $serviceAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.kubeSsh.service.type }}
  {{- if or (eq .Values.kubeSsh.service.type "NodePort") (eq .Values.kubeSsh.service.type "LoadBalancer") }}
  externalTrafficPolicy: {{ .Values.kubeSsh.service.externalTrafficPolicy }}
  {{- end }}
  {{- if and (eq .Values.kubeSsh.service.type "LoadBalancer") .Values.kubeSsh.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.kubeSsh.service.loadBalancerIP | quote }}
  {{- end }}
  {{- if and (eq .Values.kubeSsh.service.type "LoadBalancer") .Values.kubeSsh.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.kubeSsh.service.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  ports:
    - name: ssh
      port: {{ .Values.kubeSsh.service.ports.ssh }}
      targetPort: ssh
      protocol: TCP
      {{- if and (or (eq .Values.kubeSsh.service.type "NodePort") (eq .Values.kubeSsh.service.type "LoadBalancer")) .Values.kubeSsh.service.nodePorts.ssh }}
      nodePort: {{ .Values.kubeSsh.service.nodePorts.ssh }}
      {{- end }}
  selector:
    {{- include "kube-ssh.selectorLabels" . | nindent 4 }}
