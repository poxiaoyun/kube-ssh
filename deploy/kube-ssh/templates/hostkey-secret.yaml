{{- if and (not .Values.kubeSsh.hostKey.existingSecret) (or .Values.kubeSsh.hostKey.privateKey .Values.kubeSsh.hostKey.autoGenerate) }}
{{- $secretName := include "kube-ssh.hostKeySecretName" . }}
{{- $secretKey := .Values.kubeSsh.hostKey.secretKey }}
{{- $privateKey := .Values.kubeSsh.hostKey.privateKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $privateKey }}
{{- if and $existing (hasKey ($existing.data | default dict) $secretKey) }}
{{- $privateKey = index $existing.data $secretKey | b64dec }}
{{- else }}
{{- $privateKey = genPrivateKey "ed25519" }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kube-ssh.labels" . | nindent 4 }}
  {{- with .Values.kubeSsh.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{ $secretKey }}: {{ $privateKey | b64enc | quote }}
{{- end }}
