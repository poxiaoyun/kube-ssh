global:
  imageRegistry: ""
  imageRepository: ""
  imagePullSecrets: []
  storageClass:
  security:
    allowInsecureImages: true
  clusterDomain: cluster.local

kubeSsh:
  image:
    registry: registry.cn-hangzhou.aliyuncs.com
    repository: xiaoshiai/kube-ssh
    tag: ""
    pullPolicy: IfNotPresent
    pullSecrets: []

  replicaCount: 1
  revisionHistoryLimit: 10

  containerPorts:
    ssh: 22

  service:
    type: ClusterIP
    annotations: {}
    ports:
      ssh: 22
    nodePorts: {}
    externalTrafficPolicy: Cluster
    loadBalancerIP: ""
    loadBalancerSourceRanges: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  rbac:
    create: true

  hostKey:
    existingSecret: ""
    secretKey: ssh_host_key
    privateKey: ""
    mountPath: /etc/kube-ssh/host-key

  helper:
    path: /usr/local/bin/kube-ssh-helper
    remoteDir: /tmp

  accessPolicy:
    enabled: true
    namespace: ""

  authentication:
    anonymous: false
    authorizedKeys: []
    passwords: []
    webhook:
      server: ""
      proxyURL: ""
      token: ""
      username: ""
      password: ""
      caFile: ""
      certFile: ""
      keyFile: ""
      insecureSkipTLSVerify: false
      timeout: ""

  authorization:
    allowAll: false
    kubernetesSAR: true
    allow: []
    deny: []
    webhook:
      server: ""
      proxyURL: ""
      token: ""
      username: ""
      password: ""
      caFile: ""
      certFile: ""
      keyFile: ""
      insecureSkipTLSVerify: false
      timeout: ""

  extraArgs: []
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []

  podAnnotations: {}
  podLabels: {}
  deploymentAnnotations: {}
  commonLabels: {}
  commonAnnotations: {}

  podSecurityContext: {}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      add:
        - NET_BIND_SERVICE
      drop:
        - ALL

  resources:
    limits: {}
    requests: {}

  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  startupProbe: {}

  affinity: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  schedulerName: ""
