apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-ssh
  namespace: "kube-ssh"
  labels:
    helm.sh/chart: kube-ssh-0.0.0
    app.kubernetes.io/name: kube-ssh
    app.kubernetes.io/instance: kube-ssh
    app.kubernetes.io/version: "v0.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-ssh
      app.kubernetes.io/instance: kube-ssh
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-ssh
        app.kubernetes.io/instance: kube-ssh
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: kube-ssh
      containers:
        - name: kube-ssh
          image: "registry.cn-hangzhou.aliyuncs.com/xiaoshiai/kube-ssh:v0.0.0"
          imagePullPolicy: "IfNotPresent"
          ports:
            - name: ssh
              containerPort: 22
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
              - NET_BIND_SERVICE
              drop:
              - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          resources:
            limits: {}
            requests: {}
          env:
            - name: LISTEN_ADDRESS
              value: ":22"
            - name: METRICS_LISTEN_ADDRESS
              value: ":8080"
            - name: METRICS_PATH
              value: "/metrics"
            - name: POLICY_DEFAULT_CONTAINER_MODE
              value: "KubernetesDefault"
            - name: POLICY_DEFAULT_CAPABILITY
              value: "*"
            - name: POLICY_DEFAULT_ENV
              value: "*"
            - name: POLICY_DEFAULT_LOCAL_FORWARD
              value: "*"
            - name: POLICY_DEFAULT_REMOTE_FORWARD
              value: "*"
            - name: POLICY_DEFAULT_SHELL
              value: "/bin/sh"
